<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PipeWarden — Connection Manager</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4eb;
      --muted: #8b8fa3;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .header {
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 20px; font-weight: 600; }
    .header h1 span { color: var(--accent); }
    .header-actions { display: flex; gap: 8px; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-card .value { font-size: 28px; font-weight: 700; }
    .stat-card .label { font-size: 12px; color: var(--muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .connections-list { display: flex; flex-direction: column; gap: 8px; }
    .conn-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: border-color 0.15s;
    }
    .conn-card:hover { border-color: var(--accent); }
    .conn-icon {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .conn-icon.github { background: #1f2937; color: #f9fafb; }
    .conn-icon.gitlab { background: #1f1030; color: #fc6d26; }
    .conn-icon.bitbucket { background: #0f1f3d; color: #2684ff; }
    .conn-info { flex: 1; min-width: 0; }
    .conn-name { font-weight: 600; font-size: 14px; }
    .conn-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .conn-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
    .status-dot.ok { background: var(--green); }
    .status-dot.fail { background: var(--red); }
    .status-dot.pending { background: var(--yellow); animation: pulse 1s infinite; }
    .status-dot.unknown { background: var(--muted); }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 440px;
      max-width: 95vw;
      padding: 24px;
    }
    .modal h2 { font-size: 18px; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .platform-fields { display: none; }
    .platform-fields.active { display: block; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 8px; }
    .test-result {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: var(--radius);
      font-size: 12px;
      display: none;
    }
    .test-result.show { display: block; }
    .test-result.ok { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: var(--green); }
    .test-result.fail { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: var(--red); }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-header h2 { font-size: 16px; }
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: 12px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      z-index: 200;
      animation: slideIn 0.3s;
    }
    .toast.success { background: var(--green); color: #fff; }
    .toast.error { background: var(--red); color: #fff; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .finding-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 8px;
    }
    .finding-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .severity-badge {
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .severity-badge.critical { background: #7f1d1d; color: #fca5a5; }
    .severity-badge.high { background: #7c2d12; color: #fdba74; }
    .severity-badge.medium { background: #713f12; color: #fde047; }
    .severity-badge.low { background: #14532d; color: #86efac; }
    .severity-badge.info { background: #1e3a5f; color: #93c5fd; }
    .finding-title { font-weight: 600; font-size: 14px; }
    .finding-desc { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
    .finding-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; }
    .risk-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 18px;
      font-weight: 700;
      border: 3px solid;
    }
    .risk-score.low { border-color: var(--green); color: var(--green); }
    .risk-score.medium { border-color: var(--yellow); color: var(--yellow); }
    .risk-score.high { border-color: #f97316; color: #f97316; }
    .risk-score.critical { border-color: var(--red); color: var(--red); }
    .analysis-summary {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .analysis-summary .summary-text { flex: 1; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <h1><span>Pipe</span>Warden</h1>
    <div class="header-actions">
      <button class="btn btn-outline" onclick="showAnalyzeModal()">Analyze Run</button>
      <button class="btn btn-outline" onclick="testAll()">Test All</button>
      <button class="btn btn-primary" onclick="showAddModal()">+ Add Connection</button>
    </div>
  </div>

  <div class="container">
    <div class="stats" id="stats">
      <div class="stat-card"><div class="value" id="stat-total">-</div><div class="label">Total</div></div>
      <div class="stat-card"><div class="value" id="stat-github">-</div><div class="label">GitHub</div></div>
      <div class="stat-card"><div class="value" id="stat-gitlab">-</div><div class="label">GitLab</div></div>
      <div class="stat-card"><div class="value" id="stat-bitbucket">-</div><div class="label">Bitbucket</div></div>
    </div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('connections')">Connections</div>
      <div class="tab" onclick="switchTab('findings')">Security Findings</div>
      <div class="tab" onclick="switchTab('history')">Analysis History</div>
    </div>

    <div id="tab-connections" class="tab-content active">
      <div class="section-header">
        <h2>Connections</h2>
      </div>
      <div id="connections-list" class="connections-list"></div>
    </div>

    <div id="tab-findings" class="tab-content">
      <div class="section-header">
        <h2>Security Findings</h2>
      </div>
      <div id="findings-list"></div>
    </div>

    <div id="tab-history" class="tab-content">
      <div class="section-header">
        <h2>Analysis History</h2>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <!-- Add Connection Modal -->
  <div class="modal-overlay hidden" id="add-modal">
    <div class="modal">
      <h2>Add Connection</h2>
      <form id="add-form" onsubmit="addConnection(event)">
        <div class="form-group">
          <label>Connection Name</label>
          <input type="text" id="conn-name" placeholder="e.g. github-main" required>
        </div>
        <div class="form-group">
          <label>Platform</label>
          <select id="conn-platform" onchange="togglePlatformFields()">
            <option value="github">GitHub Actions</option>
            <option value="gitlab">GitLab CI/CD</option>
            <option value="bitbucket">Bitbucket Pipelines</option>
          </select>
        </div>
        <div id="fields-github" class="platform-fields active">
          <div class="form-group">
            <label>Personal Access Token</label>
            <input type="password" id="gh-token" placeholder="ghp_xxx">
          </div>
          <div class="form-group">
            <label>Base URL (optional)</label>
            <input type="text" id="gh-base-url" placeholder="https://api.github.com">
          </div>
        </div>
        <div id="fields-gitlab" class="platform-fields">
          <div class="form-group">
            <label>Access Token</label>
            <input type="password" id="gl-token" placeholder="glpat-xxx">
          </div>
          <div class="form-group">
            <label>Base URL (optional)</label>
            <input type="text" id="gl-base-url" placeholder="https://gitlab.com/api/v4">
          </div>
        </div>
        <div id="fields-bitbucket" class="platform-fields">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="bb-username" placeholder="your-username">
          </div>
          <div class="form-group">
            <label>App Password</label>
            <input type="password" id="bb-app-password" placeholder="your-app-password">
          </div>
          <div class="form-group">
            <label>Base URL (optional)</label>
            <input type="text" id="bb-base-url" placeholder="https://api.bitbucket.org/2.0">
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeAddModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Connection</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Analyze Modal -->
  <div class="modal-overlay hidden" id="analyze-modal">
    <div class="modal">
      <h2>Analyze Pipeline Run</h2>
      <form id="analyze-form" onsubmit="runAnalysis(event)">
        <div class="form-group">
          <label>Connection</label>
          <select id="analyze-conn"></select>
        </div>
        <div class="form-group">
          <label>Owner / Organization</label>
          <input type="text" id="analyze-owner" placeholder="e.g. my-org" required>
        </div>
        <div class="form-group">
          <label>Repository</label>
          <input type="text" id="analyze-repo" placeholder="e.g. my-repo" required>
        </div>
        <div class="form-group">
          <label>Run ID</label>
          <input type="text" id="analyze-run-id" placeholder="e.g. 12345" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-outline" onclick="closeAnalyzeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary" id="analyze-submit-btn">Analyze</button>
        </div>
      </form>
    </div>
  </div>

<script>
const API = '/api/v1/connections';
let connectionStatuses = {};

async function loadConnections() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    renderConnections(data.connections || []);
    updateStats(data.connections || []);
  } catch (e) {
    document.getElementById('connections-list').innerHTML =
      '<div class="empty-state"><h3>Unable to reach API</h3><p>Check that PipeWarden is running.</p></div>';
  }
}

function renderConnections(conns) {
  const list = document.getElementById('connections-list');
  if (conns.length === 0) {
    list.innerHTML = '<div class="empty-state"><h3>No connections yet</h3><p>Add your first CI/CD connection to get started.</p></div>';
    return;
  }
  list.innerHTML = conns.map(c => {
    const st = connectionStatuses[c.name];
    let statusHTML = '<span class="status-dot unknown"></span>Not tested';
    if (st === 'testing') {
      statusHTML = '<span class="status-dot pending"></span>Testing...';
    } else if (st && st.connected) {
      statusHTML = `<span class="status-dot ok"></span>Connected as ${st.user || 'unknown'} (${st.latency ? (st.latency/1e6).toFixed(0) + 'ms' : ''})`;
    } else if (st && !st.connected) {
      statusHTML = `<span class="status-dot fail"></span>${st.message || 'Failed'}`;
    }
    const icon = c.platform === 'github' ? 'GH' : c.platform === 'gitlab' ? 'GL' : 'BB';
    return `
      <div class="conn-card" id="card-${c.name}">
        <div class="conn-icon ${c.platform}">${icon}</div>
        <div class="conn-info">
          <div class="conn-name">${esc(c.name)}</div>
          <div class="conn-meta">${c.platform}${c.base_url ? ' &middot; ' + esc(c.base_url) : ''}</div>
          <div class="conn-meta">${statusHTML}</div>
        </div>
        <div class="conn-actions">
          <button class="btn btn-outline btn-sm" onclick="testOne('${esc(c.name)}')">Test</button>
          <button class="btn btn-danger btn-sm" onclick="deleteConn('${esc(c.name)}')">Remove</button>
        </div>
      </div>`;
  }).join('');
}

function updateStats(conns) {
  document.getElementById('stat-total').textContent = conns.length;
  document.getElementById('stat-github').textContent = conns.filter(c => c.platform === 'github').length;
  document.getElementById('stat-gitlab').textContent = conns.filter(c => c.platform === 'gitlab').length;
  document.getElementById('stat-bitbucket').textContent = conns.filter(c => c.platform === 'bitbucket').length;
}

async function addConnection(e) {
  e.preventDefault();
  const platform = document.getElementById('conn-platform').value;
  const body = {
    name: document.getElementById('conn-name').value,
    platform: platform,
  };
  if (platform === 'github') {
    body.token = document.getElementById('gh-token').value;
    body.base_url = document.getElementById('gh-base-url').value;
  } else if (platform === 'gitlab') {
    body.token = document.getElementById('gl-token').value;
    body.base_url = document.getElementById('gl-base-url').value;
  } else {
    body.username = document.getElementById('bb-username').value;
    body.app_password = document.getElementById('bb-app-password').value;
    body.base_url = document.getElementById('bb-base-url').value;
  }

  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      toast(err.error || 'Failed to add', 'error');
      return;
    }
    toast('Connection added!', 'success');
    closeAddModal();
    document.getElementById('add-form').reset();
    loadConnections();
  } catch (e) {
    toast('Network error', 'error');
  }
}

async function deleteConn(name) {
  if (!confirm(`Remove connection "${name}"?`)) return;
  try {
    const res = await fetch(`${API}/${encodeURIComponent(name)}`, { method: 'DELETE' });
    if (!res.ok) {
      toast('Failed to remove', 'error');
      return;
    }
    delete connectionStatuses[name];
    toast('Connection removed', 'success');
    loadConnections();
  } catch (e) {
    toast('Network error', 'error');
  }
}

async function testOne(name) {
  connectionStatuses[name] = 'testing';
  loadConnections();
  try {
    const res = await fetch(`${API}/${encodeURIComponent(name)}/test`, { method: 'POST' });
    const data = await res.json();
    connectionStatuses[name] = data;
  } catch (e) {
    connectionStatuses[name] = { connected: false, message: 'Request failed' };
  }
  loadConnections();
}

async function testAll() {
  const res0 = await fetch(API);
  const data0 = await res0.json();
  (data0.connections || []).forEach(c => { connectionStatuses[c.name] = 'testing'; });
  loadConnections();

  try {
    const res = await fetch(`${API}/test`, { method: 'POST' });
    const data = await res.json();
    Object.assign(connectionStatuses, data);
  } catch (e) {
    toast('Test failed', 'error');
  }
  loadConnections();
}

function showAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
function togglePlatformFields() {
  document.querySelectorAll('.platform-fields').forEach(el => el.classList.remove('active'));
  const p = document.getElementById('conn-platform').value;
  document.getElementById('fields-' + p).classList.add('active');
}

function toast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('add-modal').addEventListener('click', function(e) {
  if (e.target === this) closeAddModal();
});
document.getElementById('analyze-modal').addEventListener('click', function(e) {
  if (e.target === this) closeAnalyzeModal();
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'findings') loadFindings();
  if (tab === 'history') loadHistory();
}

async function showAnalyzeModal() {
  const res = await fetch(API);
  const data = await res.json();
  const sel = document.getElementById('analyze-conn');
  sel.innerHTML = (data.connections || []).map(c =>
    `<option value="${esc(c.name)}">${esc(c.name)} (${c.platform})</option>`
  ).join('');
  document.getElementById('analyze-modal').classList.remove('hidden');
}
function closeAnalyzeModal() { document.getElementById('analyze-modal').classList.add('hidden'); }

async function runAnalysis(e) {
  e.preventDefault();
  const btn = document.getElementById('analyze-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  const body = {
    connection_name: document.getElementById('analyze-conn').value,
    owner: document.getElementById('analyze-owner').value,
    repo: document.getElementById('analyze-repo').value,
    run_id: document.getElementById('analyze-run-id').value,
  };
  try {
    const res = await fetch('/api/v1/analysis/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) {
      toast(data.error || 'Analysis failed', 'error');
      return;
    }
    toast(`Analysis complete: ${data.findings ? data.findings.length : 0} findings, risk score ${data.risk_score}`, 'success');
    closeAnalyzeModal();
    document.getElementById('analyze-form').reset();
    switchTab('findings');
  } catch (err) {
    toast('Network error', 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyze';
  }
}

async function loadFindings() {
  const el = document.getElementById('findings-list');
  try {
    const res = await fetch('/api/v1/analysis/findings');
    const data = await res.json();
    const findings = data.findings || [];
    if (findings.length === 0) {
      el.innerHTML = '<div class="empty-state"><h3>No findings yet</h3><p>Run a security analysis to see findings here.</p></div>';
      return;
    }
    el.innerHTML = findings.map(f => `
      <div class="finding-card">
        <div class="finding-header">
          <span class="severity-badge ${f.severity}">${f.severity}</span>
          <span class="finding-title">${esc(f.title)}</span>
        </div>
        <div class="finding-desc">${esc(f.description)}</div>
        <div class="finding-meta">
          <span>Category: ${f.category}</span>
          <span>Connection: ${esc(f.connection_name)}</span>
          <span>Run: ${esc(f.run_id)}</span>
          <span>Confidence: ${(f.confidence * 100).toFixed(0)}%</span>
        </div>
        ${f.remediation ? `<div class="finding-desc" style="margin-top:8px"><strong>Fix:</strong> ${esc(f.remediation)}</div>` : ''}
      </div>
    `).join('');
  } catch (err) {
    el.innerHTML = '<div class="empty-state"><h3>Failed to load findings</h3></div>';
  }
}

async function loadHistory() {
  const el = document.getElementById('history-list');
  try {
    const res = await fetch('/api/v1/analysis/history');
    const data = await res.json();
    const history = data.history || [];
    if (history.length === 0) {
      el.innerHTML = '<div class="empty-state"><h3>No analysis history</h3><p>Run a security analysis to see results here.</p></div>';
      return;
    }
    el.innerHTML = history.map(h => {
      const riskClass = h.risk_score >= 80 ? 'critical' : h.risk_score >= 60 ? 'high' : h.risk_score >= 30 ? 'medium' : 'low';
      return `
        <div class="analysis-summary">
          <div class="risk-score ${riskClass}">${h.risk_score}</div>
          <div class="summary-text">
            <div><strong>${esc(h.connection_name)}</strong> &middot; Run ${esc(h.run_id)}</div>
            <div style="color:var(--muted);font-size:13px;margin-top:4px">${esc(h.summary)}</div>
            <div class="finding-meta" style="margin-top:4px">
              <span>${h.findings_count} findings</span>
              <span>${h.tokens_used} tokens</span>
              <span>${h.duration_ms}ms</span>
              <span>${h.model}</span>
              <span>${new Date(h.analyzed_at).toLocaleString()}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  } catch (err) {
    el.innerHTML = '<div class="empty-state"><h3>Failed to load history</h3></div>';
  }
}

loadConnections();
</script>
</body>
</html>
